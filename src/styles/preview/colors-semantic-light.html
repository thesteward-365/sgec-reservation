<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../token.css" />
    <style>
      body {
        margin: 0;
        padding: 20px;
        background: #fff;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }
      .tok {
        border: 1px solid var(--color-border-subtle);
        border-radius: 12px;
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        background: #fff;
      }
      .chip {
        height: 36px;
        border-radius: 8px;
        border: 1px solid var(--color-border-subtle);
      }
      .k {
        font: 600 11px/1.3 var(--font-mono);
        color: var(--color-fg);
        letter-spacing: 0.012em;
      }
      .v {
        font: 500 10px/1.3 var(--font-mono);
        color: var(--color-fg-tertiary);
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div class="tok">
        <div class="chip" style="background: #ffffff"></div>
        <div class="k">--color-bg</div>
        <div class="v">#FFFFFF</div>
      </div>
      <div class="tok">
        <div class="chip" style="background: #f7f7f8"></div>
        <div class="k">--color-bg-subtle</div>
        <div class="v">#F7F7F8</div>
      </div>
      <div class="tok">
        <div class="chip" style="background: #171719"></div>
        <div class="k" style="color: #000">--color-fg</div>
        <div class="v">#171719</div>
      </div>
      <div class="tok">
        <div class="chip" style="background: #70737c"></div>
        <div class="k">--color-fg-tertiary</div>
        <div class="v">#70737C</div>
      </div>
      <div class="tok">
        <div class="chip" style="background: #0066ff"></div>
        <div class="k">--color-accent</div>
        <div class="v">#0066FF</div>
      </div>
      <div class="tok">
        <div class="chip" style="background: #00bf40"></div>
        <div class="k">--color-success</div>
        <div class="v">#00BF40</div>
      </div>
      <div class="tok">
        <div class="chip" style="background: #ff4242"></div>
        <div class="k">--color-danger</div>
        <div class="v">#FF4242</div>
      </div>
      <div class="tok">
        <div class="chip" style="background: #ff9200"></div>
        <div class="k">--color-warning</div>
        <div class="v">#FF9200</div>
      </div>
    </div>
  </body>
</html>
