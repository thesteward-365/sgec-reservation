<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../token.css" />
    <style>
      body {
        margin: 0;
        padding: 20px;
        background: #fff;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(8, 1fr);
        gap: 10px;
      }
      .r {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
      }
      .shape {
        width: 64px;
        height: 64px;
        background: #f4f4f5;
        border: 1px solid var(--color-border-subtle);
      }
      .k {
        font: 600 10px/1.3 var(--font-mono);
        color: var(--color-fg);
      }
      .v {
        font: 500 10px/1.3 var(--font-mono);
        color: var(--color-fg-tertiary);
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div class="r">
        <div class="shape" style="border-radius: 4px"></div>
        <div class="k">xs</div>
        <div class="v">4</div>
      </div>
      <div class="r">
        <div class="shape" style="border-radius: 8px"></div>
        <div class="k">sm</div>
        <div class="v">8</div>
      </div>
      <div class="r">
        <div class="shape" style="border-radius: 12px"></div>
        <div class="k">md</div>
        <div class="v">12</div>
      </div>
      <div class="r">
        <div class="shape" style="border-radius: 16px"></div>
        <div class="k">lg</div>
        <div class="v">16</div>
      </div>
      <div class="r">
        <div class="shape" style="border-radius: 20px"></div>
        <div class="k">xl</div>
        <div class="v">20</div>
      </div>
      <div class="r">
        <div class="shape" style="border-radius: 24px"></div>
        <div class="k">2xl</div>
        <div class="v">24</div>
      </div>
      <div class="r">
        <div class="shape" style="border-radius: 32px"></div>
        <div class="k">3xl</div>
        <div class="v">32</div>
      </div>
      <div class="r">
        <div class="shape" style="border-radius: 50%"></div>
        <div class="k">circle</div>
        <div class="v">50%</div>
      </div>
    </div>
  </body>
</html>
