<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../token.css" />
    <style>
      body {
        margin: 0;
        padding: 24px;
        background: #fff;
      }
      .row {
        display: flex;
        align-items: baseline;
        gap: 16px;
        padding: 10px 0;
        border-bottom: 1px solid var(--color-border-subtle);
      }
      .row:last-child {
        border-bottom: none;
      }
      .label {
        width: 48px;
        flex: none;
        font: 600 12px/1.4 var(--font-mono);
        color: var(--color-fg-tertiary);
        text-transform: uppercase;
      }
      .spec {
        margin-left: auto;
        font: 400 12px/1.4 var(--font-mono);
        color: var(--color-fg-tertiary);
      }
    </style>
  </head>
  <body>
    <div class="row">
      <div class="label">h1</div>
      <div
        style="
          font: 700 28px/1.358 var(--font-sans);
          letter-spacing: -0.024em;
          color: #000;
        "
      >
        디자인 시스템으로 일관된 경험을
      </div>
      <div class="spec">28 · bold · -.024</div>
    </div>
    <div class="row">
      <div class="label">h2</div>
      <div
        style="
          font: 700 24px/1.334 var(--font-sans);
          letter-spacing: -0.023em;
          color: #000;
        "
      >
        함께 만드는 일하는 환경
      </div>
      <div class="spec">24 · bold · -.023</div>
    </div>
    <div class="row">
      <div class="label">h3</div>
      <div
        style="
          font: 600 21px/1.358 var(--font-sans);
          letter-spacing: -0.018em;
          color: #000;
        "
      >
        Title (subhead)
      </div>
      <div class="spec">21 · semibold · -.018</div>
    </div>
    <div class="row">
      <div class="label">h4</div>
      <div style="font: 600 20px/1.4 var(--font-sans); color: #000">
        Section heading
      </div>
      <div class="spec">20 · semibold</div>
    </div>
    <div class="row">
      <div class="label">h5</div>
      <div style="font: 600 17px/1.5 var(--font-sans); color: #000">
        Card heading
      </div>
      <div class="spec">17 · semibold</div>
    </div>
  </body>
</html>
