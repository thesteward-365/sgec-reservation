<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../token.css" />
    <style>
      body {
        margin: 0;
        padding: 24px;
        background: #fff;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }
      .b {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font: 600 12px/1 var(--font-sans);
        letter-spacing: 0.012em;
        border-radius: 9999px;
        padding: 6px 10px;
      }
      .tag {
        font: 600 10px/1.2 var(--font-mono);
        color: var(--color-fg-tertiary);
        text-transform: uppercase;
        letter-spacing: 0.024em;
        width: 64px;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <span class="tag">Solid</span>
      <span class="b" style="background: #0066ff; color: #fff">신규</span>
      <span class="b" style="background: #00bf40; color: #fff">합격</span>
      <span class="b" style="background: #ff4242; color: #fff">마감</span>
      <span class="b" style="background: #ff9200; color: #fff">검토</span>
      <span class="b" style="background: #171719; color: #fff">PRO</span>
    </div>
    <div class="row">
      <span class="tag">Subtle</span>
      <span class="b" style="background: #eaf2fe; color: #0066ff">진행중</span>
      <span class="b" style="background: #d9ffe6; color: #00bf40">매칭</span>
      <span class="b" style="background: #feecec; color: #b20c0c">종료</span>
      <span class="b" style="background: #fef4e6; color: #9c5800">대기</span>
      <span class="b" style="background: #f0ecfe; color: #5b37ed">추천</span>
    </div>
    <div class="row">
      <span class="tag">Outline</span>
      <span
        class="b"
        style="
          background: #fff;
          color: #171719;
          border: 1px solid rgba(112, 115, 124, 0.22);
          padding: 5px 10px;
        "
        >React</span
      >
      <span
        class="b"
        style="
          background: #fff;
          color: #171719;
          border: 1px solid rgba(112, 115, 124, 0.22);
          padding: 5px 10px;
        "
        >3년 이상</span
      >
      <span
        class="b"
        style="
          background: #fff;
          color: #171719;
          border: 1px solid rgba(112, 115, 124, 0.22);
          padding: 5px 10px;
        "
        >서울 · 강남구</span
      >
    </div>
  </body>
</html>
