<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../token.css" />
    <style>
      body {
        margin: 0;
        padding: 24px;
        background: #fff;
      }
      pre {
        font: 500 14px/1.6 var(--font-mono);
        background: var(--color-bg-subtle);
        border: 1px solid var(--color-border-subtle);
        border-radius: 12px;
        padding: 16px;
        margin: 0 0 12px 0;
        color: var(--color-fg-strong);
      }
      .kbd {
        font: 600 12px/1.2 var(--font-mono);
        background: #fff;
        border: 1px solid var(--color-border-subtle);
        border-bottom-width: 2px;
        border-radius: 6px;
        padding: 2px 6px;
        color: var(--color-fg);
      }
      .row {
        display: flex;
        gap: 8px;
        align-items: center;
        color: var(--color-fg-tertiary);
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <pre><span style="color:#70737C">// SF Mono / ui-monospace</span>
<span style="color:#0066FF">const</span> wanted = { font: <span style="color:#00BF40">'Pretendard JP'</span> };</pre>
    <div class="row">
      Press <span class="kbd">⌘</span> <span class="kbd">K</span> to search ·
      <span class="kbd">Esc</span> to close
    </div>
  </body>
</html>
