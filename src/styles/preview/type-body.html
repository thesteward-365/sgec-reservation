<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../token.css" />
    <style>
      body {
        margin: 0;
        padding: 24px;
        background: #fff;
      }
      .row {
        display: flex;
        align-items: baseline;
        gap: 16px;
        padding: 10px 0;
        border-bottom: 1px solid var(--color-border-subtle);
      }
      .row:last-child {
        border-bottom: none;
      }
      .label {
        width: 96px;
        flex: none;
        font: 600 12px/1.4 var(--font-mono);
        color: var(--color-fg-tertiary);
        text-transform: uppercase;
      }
      .spec {
        margin-left: auto;
        font: 400 12px/1.4 var(--font-mono);
        color: var(--color-fg-tertiary);
      }
    </style>
  </head>
  <body>
    <div class="row">
      <div class="label">body-lg</div>
      <div
        style="
          font: 500 16px/1.5 var(--font-sans);
          letter-spacing: 0.006em;
          color: var(--color-fg);
        "
      >
        파운데이션은 사용자 인터페이스를 그리는 중요한 기반입니다.
      </div>
      <div class="spec">16 · 500</div>
    </div>
    <div class="row">
      <div class="label">body</div>
      <div
        style="
          font: 500 15px/1.5 var(--font-sans);
          letter-spacing: 0.006em;
          color: var(--color-fg);
        "
      >
        A consistent voice across every surface.
      </div>
      <div class="spec">15 · 500</div>
    </div>
    <div class="row">
      <div class="label">body-sm</div>
      <div
        style="
          font: 500 14px/1.5 var(--font-sans);
          letter-spacing: 0.012em;
          color: var(--color-fg-secondary);
        "
      >
        Helper text · supporting copy · inline labels
      </div>
      <div class="spec">14 · 500</div>
    </div>
    <div class="row">
      <div class="label">caption</div>
      <div
        style="
          font: 500 13px/1.5 var(--font-sans);
          letter-spacing: 0.018em;
          color: var(--color-fg-tertiary);
        "
      >
        Caption — 13/19.5 · 70737C
      </div>
      <div class="spec">13 · 500</div>
    </div>
    <div class="row">
      <div class="label">overline</div>
      <div
        style="
          font: 600 12px/1.4 var(--font-sans);
          letter-spacing: 0.024em;
          color: var(--color-fg-tertiary);
          text-transform: uppercase;
        "
      >
        Overline label
      </div>
      <div class="spec">12 · 600 · UPPER</div>
    </div>
    <div class="row">
      <div class="label">micro</div>
      <div
        style="
          font: 700 11px/1.273 var(--font-sans);
          letter-spacing: 0.031em;
          color: var(--color-fg-tertiary);
        "
      >
        100
      </div>
      <div class="spec">11 · 700</div>
    </div>
  </body>
</html>
