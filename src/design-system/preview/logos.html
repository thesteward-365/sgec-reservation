<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:0;background:#fff;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;height:100vh}
.cell{display:flex;align-items:center;justify-content:center;padding:24px;border:1px solid rgba(112,115,124,.18)}
.cell img{max-width:80%;max-height:60px}
.dark{background:#171719}
</style></head><body>
<div class="cell"><img src="../assets/logo-default.svg" alt="default"></div>
<div class="cell dark"><img src="../assets/logo-white.svg" alt="white"></div>
<div class="cell"><img src="../assets/symbol-blue.svg" style="max-height:48px"><img src="../assets/symbol-black.svg" style="max-height:48px;margin-left:12px"><img src="../assets/symbol-white.svg" style="max-height:48px;margin-left:12px"></div>
<div class="cell" style="background:#F4F4F5"><img src="../assets/logo-gray.svg" alt="gray"></div>
</body></html>
