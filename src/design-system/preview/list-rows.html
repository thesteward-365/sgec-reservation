<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:0;background:#fff}
.row{display:flex;align-items:center;gap:12px;padding:14px 24px;border-bottom:1px solid rgba(112,115,124,.22);cursor:pointer;transition:background 120ms var(--ease-standard)}
.row:hover{background:#F7F7F8}
.row.active{background:#EAF2FE}
.dot{width:36px;height:36px;border-radius:9999px;background:#F4F4F5;display:flex;align-items:center;justify-content:center;font:700 14px/1 var(--font-display);color:#46474C;flex:none}
.dot.b{background:#0066FF;color:#fff}
.body{flex:1;min-width:0}
.t{font:600 15px/1.4 var(--font-sans);color:#171719;letter-spacing:-.006em;margin:0}
.s{font:500 13px/1.5 var(--font-sans);color:#70737C;margin:0;text-overflow:ellipsis;overflow:hidden;white-space:nowrap}
.time{font:500 12px/1.3 var(--font-mono);color:#70737C;letter-spacing:.012em;flex:none}
.chev{color:#AEB0B6;flex:none}
</style></head><body>
<div class="row active"><div class="dot b">W</div><div class="body"><p class="t">Wanted Talent</p><p class="s">새로운 매칭 5건이 도착했어요</p></div><span class="time">방금</span><span class="chev">›</span></div>
<div class="row"><div class="dot">T</div><div class="body"><p class="t">Toss</p><p class="s">서류 합격 안내 · Product Designer</p></div><span class="time">2시간</span><span class="chev">›</span></div>
<div class="row"><div class="dot">N</div><div class="body"><p class="t">Naver</p><p class="s">관심 회사가 새 공고를 등록했습니다</p></div><span class="time">어제</span><span class="chev">›</span></div>
</body></html>
