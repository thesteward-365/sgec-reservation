<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:#fff;font:500 11px/1.3 var(--font-mono);color:var(--color-fg-tertiary)}
.scale{display:grid;grid-template-columns:repeat(13,1fr);gap:0;border-radius:12px;overflow:hidden;border:1px solid var(--color-border-subtle)}
.sw{aspect-ratio:1;display:flex;flex-direction:column;justify-content:flex-end;padding:6px;font-size:9px}
.sw.dark{color:#fff}
.title{margin-bottom:8px;font:600 12px/1.4 var(--font-sans);color:var(--color-fg);letter-spacing:.006em}
.bigprimary{margin-top:12px;display:flex;align-items:center;gap:12px}
.chip{width:48px;height:48px;border-radius:12px}
</style></head><body>
<div class="title">Blue — Wanted Blue</div>
<div class="scale">
<div class="sw" style="background:#F7FBFF;border-right:1px solid var(--color-border-subtle)">50</div>
<div class="sw" style="background:#EAF2FE">100</div>
<div class="sw" style="background:#C9DEFE">200</div>
<div class="sw" style="background:#9EC5FF">300</div>
<div class="sw" style="background:#69A5FF">400</div>
<div class="sw" style="background:#4F95FF">500</div>
<div class="sw dark" style="background:#3385FF">600</div>
<div class="sw dark" style="background:#1A75FF">700</div>
<div class="sw dark" style="background:#0066FF">800</div>
<div class="sw dark" style="background:#005EEB">900</div>
<div class="sw dark" style="background:#0054D1">1000</div>
<div class="sw dark" style="background:#003E9C">1100</div>
<div class="sw dark" style="background:#002966">1200</div>
</div>
<div class="bigprimary"><div class="chip" style="background:#0066FF"></div>
<div><div style="font:600 13px/1.3 var(--font-sans);color:var(--color-fg)">--color-accent · #0066FF</div>
<div style="font:500 11px/1.4 var(--font-mono);color:var(--color-fg-tertiary);margin-top:2px">primary action · links · brand fill</div></div></div>
</body></html>
