<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:#fff;font:500 11px/1.3 var(--font-mono);color:var(--color-fg-tertiary)}
.scale{display:grid;grid-template-columns:repeat(16,1fr);gap:0;border-radius:12px;overflow:hidden;border:1px solid var(--color-border-subtle)}
.sw{aspect-ratio:1;display:flex;flex-direction:column;justify-content:flex-end;padding:6px;font-size:9px;letter-spacing:.024em}
.sw.dark{color:#fff}
</style></head><body>
<div style="margin-bottom:8px;font:600 12px/1.4 var(--font-sans);color:var(--color-fg);letter-spacing:.006em">Mono — pure neutrals</div>
<div class="scale">
<div class="sw" style="background:#FFFFFF;border-right:1px solid var(--color-border-subtle)">100</div>
<div class="sw" style="background:#F7F7F7">200</div>
<div class="sw" style="background:#DCDCDC">300</div>
<div class="sw" style="background:#C4C4C4">400</div>
<div class="sw" style="background:#B0B0B0">500</div>
<div class="sw" style="background:#9B9B9B">600</div>
<div class="sw" style="background:#8A8A8A">700</div>
<div class="sw dark" style="background:#737373">800</div>
<div class="sw dark" style="background:#5C5C5C">900</div>
<div class="sw dark" style="background:#474747">1000</div>
<div class="sw dark" style="background:#303030">1100</div>
<div class="sw dark" style="background:#2A2A2A">1200</div>
<div class="sw dark" style="background:#1C1C1C">1300</div>
<div class="sw dark" style="background:#171717">1400</div>
<div class="sw dark" style="background:#0F0F0F">1500</div>
<div class="sw dark" style="background:#000000">1600</div>
</div>
</body></html>
