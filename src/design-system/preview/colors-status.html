<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:#fff;font:500 11px/1.3 var(--font-mono);color:var(--color-fg-tertiary)}
.row{display:grid;grid-template-columns:repeat(11,1fr);gap:0;border-radius:10px;overflow:hidden;border:1px solid var(--color-border-subtle);margin-bottom:10px}
.sw{aspect-ratio:1.4;display:flex;flex-direction:column;justify-content:flex-end;padding:5px;font-size:9px}
.sw.dark{color:#fff}
.lbl{font:600 11px/1.3 var(--font-sans);color:var(--color-fg);width:80px;display:inline-block}
.line{display:flex;align-items:center;gap:10px;margin-bottom:6px}
</style></head><body>
<div class="line"><span class="lbl">Red</span>
<div class="row" style="flex:1;margin:0">
<div class="sw" style="background:#FFFAFA">50</div><div class="sw" style="background:#FEECEC">100</div><div class="sw" style="background:#FED5D5">200</div><div class="sw" style="background:#FFB5B5">300</div><div class="sw" style="background:#FF8C8C">400</div><div class="sw" style="background:#FF6363">500</div><div class="sw dark" style="background:#FF4242">600</div><div class="sw dark" style="background:#E52222">700</div><div class="sw dark" style="background:#B20C0C">800</div><div class="sw dark" style="background:#750404">900</div><div class="sw dark" style="background:#3B0101">1000</div></div></div>
<div class="line"><span class="lbl">Green</span>
<div class="row" style="flex:1;margin:0">
<div class="sw" style="background:#F2FFF6">50</div><div class="sw" style="background:#D9FFE6">100</div><div class="sw" style="background:#ACFCC7">200</div><div class="sw" style="background:#7DF5A5">300</div><div class="sw" style="background:#49E57D">400</div><div class="sw" style="background:#1ED45A">500</div><div class="sw dark" style="background:#00BF40">600</div><div class="sw dark" style="background:#009632">700</div><div class="sw dark" style="background:#006E25">800</div><div class="sw dark" style="background:#004517">900</div><div class="sw dark" style="background:#00240C">1000</div></div></div>
<div class="line"><span class="lbl">Orange</span>
<div class="row" style="flex:1;margin:0">
<div class="sw" style="background:#FFFCF7">50</div><div class="sw" style="background:#FEF4E6">100</div><div class="sw" style="background:#FEE6C6">200</div><div class="sw" style="background:#FFD49C">300</div><div class="sw" style="background:#FFC06E">400</div><div class="sw" style="background:#FFA938">500</div><div class="sw" style="background:#FF9200">600</div><div class="sw dark" style="background:#D47800">700</div><div class="sw dark" style="background:#9C5800">800</div><div class="sw dark" style="background:#663A00">900</div><div class="sw dark" style="background:#361E00">1000</div></div></div>
<div class="line"><span class="lbl">Violet</span>
<div class="row" style="flex:1;margin:0">
<div class="sw" style="background:#FBFAFF">50</div><div class="sw" style="background:#F0ECFE">100</div><div class="sw" style="background:#DBD3FE">200</div><div class="sw" style="background:#C0B0FF">300</div><div class="sw" style="background:#9E86FC">400</div><div class="sw dark" style="background:#7D5EF7">500</div><div class="sw dark" style="background:#6541F2">600</div><div class="sw dark" style="background:#5B37ED">700</div><div class="sw dark" style="background:#4F29E5">800</div><div class="sw dark" style="background:#3A16C9">900</div><div class="sw dark" style="background:#23098F">1000</div></div></div>
</body></html>
