<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:32px;background:#F4F4F5}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:24px}
.c{height:96px;background:#fff;border-radius:16px;display:flex;align-items:flex-end;justify-content:center;padding:10px;font:600 11px/1.3 var(--font-mono);color:var(--color-fg-tertiary)}
</style></head><body>
<div class="grid">
<div class="c" style="box-shadow:0 1px 2px rgba(23,23,23,0.06)">shadow-1</div>
<div class="c" style="box-shadow:0 2px 6px rgba(23,23,23,0.07),0 1px 2px rgba(0,0,0,0.04)">shadow-2</div>
<div class="c" style="box-shadow:0 6px 16px rgba(23,23,23,0.08),0 2px 4px rgba(0,0,0,0.04)">shadow-3</div>
<div class="c" style="box-shadow:0 12px 32px rgba(23,23,23,0.10),0 4px 8px rgba(0,0,0,0.06)">shadow-4</div>
<div class="c" style="box-shadow:0 24px 64px rgba(23,23,23,0.12),0 8px 16px rgba(0,0,0,0.08)">shadow-5</div>
</div>
</body></html>
