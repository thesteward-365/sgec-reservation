<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:#F7F7F8}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.card{background:#fff;border:1px solid rgba(112,115,124,.22);border-radius:24px;padding:24px;display:flex;flex-direction:column;gap:12px;transition:box-shadow 200ms var(--ease-standard)}
.card:hover{box-shadow:0 6px 16px rgba(23,23,23,.08),0 2px 4px rgba(0,0,0,.04)}
.thumb{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#0066FF,#5B37ED);display:flex;align-items:center;justify-content:center;color:#fff;font:800 18px/1 var(--font-display)}
.title{font:700 17px/1.4 var(--font-sans);color:#000;letter-spacing:-.012em;margin:0}
.sub{font:500 13px/1.5 var(--font-sans);color:#70737C;margin:0}
.meta{display:flex;gap:10px;font:600 12px/1.3 var(--font-mono);color:#46474C;letter-spacing:.012em}
.meta b{color:#0066FF;font-weight:700}
</style></head><body>
<div class="grid">
<div class="card"><div class="thumb">W</div>
<div><h4 class="title">시니어 프론트엔드 엔지니어</h4>
<p class="sub">Wanted Lab · 서울 · 강남구</p></div>
<div class="meta"><span>경력 5년+</span>·<span>정규직</span>·<b>합격보상금 1,000만원</b></div>
</div>
<div class="card"><div class="thumb" style="background:#000">T</div>
<div><h4 class="title">Product Designer, Growth</h4>
<p class="sub">Toss · Seoul · Gangnam</p></div>
<div class="meta"><span>3+ years</span>·<span>Full-time</span>·<b>Hiring fast</b></div>
</div>
</div>
</body></html>
