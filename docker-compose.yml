version: '3.8'

services:
  # 1. Application: Next.js Standalone 빌드 및 실행
  app:
    build: .
    image: ghcr.io/thesteward-365/sgec-reservation:main
    container_name: yeyak
    env_file: .env
    ports:
      - '3000:3000'
    depends_on:
      - db
    restart: always

  # 2. Watchtower: GHCR 이미지 갱신 확인 및 자동 재시작
  watchtower:
    image: containrrr/watchtower
    container_name: yeyak-watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 60 --cleanup yeyak
    environment:
      - DOCKER_API_VERSION=1.43
      - WATCHTOWER_NOTIFICATION_URL=${WATCHTOWER_TELEGRAM_URL}
      - WATCHTOWER_NOTIFICATIONS_LEVEL=info
      - REPO_USER=${GHCR_USER}
      - REPO_PASS=${GHCR_TOKEN}
    restart: always

  # 3. Uptime Kuma: 서비스 상태 모니터링
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: yeyak-uptime-kuma
    volumes:
      - ./uptime-kuma-data:/app/data
    ports:
      - '3001:3001'
    restart: always

  # 4. PostgreSQL DB
  db:
    image: postgres:17-alpine
    container_name: yeyak-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5433:5432'
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
