<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:#fff;font:500 11px/1.3 var(--font-mono);color:var(--color-fg-tertiary)}
.scale{display:grid;grid-template-columns:repeat(11,1fr);gap:0;border-radius:12px;overflow:hidden;border:1px solid var(--color-border-subtle)}
.sw{aspect-ratio:1;display:flex;flex-direction:column;justify-content:flex-end;padding:6px;font-size:9px}
.sw.dark{color:#fff}
.title{margin-bottom:8px;font:600 12px/1.4 var(--font-sans);color:var(--color-fg);letter-spacing:.006em}
.code{font:600 10px/1.3 var(--font-mono);color:var(--color-fg-tertiary);margin-top:8px;letter-spacing:.024em}
</style></head><body>
<div class="title">Neutral — workhorse cool-grey ramp</div>
<div class="scale">
<div class="sw" style="background:#FFFFFF;border-right:1px solid var(--color-border-subtle)">100</div>
<div class="sw" style="background:#F4F4F5">200</div>
<div class="sw" style="background:#EAEBEC">300</div>
<div class="sw" style="background:#DBDCDF">500</div>
<div class="sw" style="background:#C2C4C8">600</div>
<div class="sw" style="background:#AEB0B6">700</div>
<div class="sw" style="background:#989BA2">800</div>
<div class="sw dark" style="background:#70737C">1000</div>
<div class="sw dark" style="background:#46474C">1200</div>
<div class="sw dark" style="background:#2E2F33">1500</div>
<div class="sw dark" style="background:#171719">1900</div>
</div>
<div class="code">key border = rgba(112,115,124,0.22) · neutral-1000 #70737C</div>
</body></html>
