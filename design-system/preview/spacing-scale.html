<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:#fff}

</style></head><body>
<div class="row"><div class="lbl">1</div><div class="bar" style="width:4px"></div><div class="v">4 px · --space-1</div></div>

<div class="row"><div class="lbl">12</div><div class="bar" style="width:128px"></div><div class="v">128 px · --space-12</div></div>
</body></html>
