<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:#fff;display:flex;flex-direction:column;gap:14px}
.field{display:flex;flex-direction:column;gap:6px;max-width:420px}
.lbl{font:600 13px/1.4 var(--font-sans);color:var(--color-fg-strong)}
.inp{font:500 15px/1.5 var(--font-sans);color:var(--color-fg);padding:11px 14px;border:1px solid rgba(112,115,124,.22);border-radius:8px;background:#fff;outline:none;transition:border-color 120ms var(--ease-standard),box-shadow 120ms var(--ease-standard)}
.inp::placeholder{color:#70737C}
.inp:focus{border-color:#0066FF;box-shadow:0 0 0 3px rgba(0,102,255,.32)}
.inp.error{border-color:#FF4242}
.help{font:500 12px/1.4 var(--font-sans);color:var(--color-fg-tertiary);letter-spacing:.012em}
.help.err{color:#FF4242}
</style></head><body>
<div class="field"><label class="lbl">이메일</label><input class="inp" placeholder="you@example.com" value="hello@wanted.co.kr"></div>
<div class="field"><label class="lbl">Password</label><input class="inp" type="password" value="abcdef"><div class="help">8자 이상, 대소문자 + 숫자 포함</div></div>
<div class="field"><label class="lbl">Company</label><input class="inp error" placeholder="Search companies"><div class="help err">회사명을 입력해 주세요.</div></div>
</body></html>
