name: Google Calendar Sync

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call Sync API
        run: |
          curl -X POST "${{ secrets.APP_URL }}/api/external-events/sync" \
          -H "Authorization: Bearer ${{ secrets.SYNC_TOKEN }}"
