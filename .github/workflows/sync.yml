name: Google Calendar Sync

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call Sync API
        run: |
          if [ -z "${{ secrets.APP_URL }}" ]; then
            echo "::error::APP_URL secret is not configured in GitHub Repository Secrets."
            exit 1
          fi
          curl -f -X POST "${{ secrets.APP_URL }}/api/external-events/sync" \
            -H "Authorization: Bearer ${{ secrets.SYNC_TOKEN }}"
